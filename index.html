<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KE:SAI - Kyutai ELLIS Scalable Autonomous Intelligence</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background-color: #000000; /* Pure Black */
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .logo {
            display: block;
            height: auto;
            width: 50%; /* Desktop width */
            margin-bottom: 40px; /* Increased spacing */
        }

        .tagline {
            color: #dcdcdc; /* Brighter, cleaner light grey */
            font-weight: 600; /* Much thicker/bolder */
            font-size: 1.8rem; /* Significantly larger */
            letter-spacing: 0.05rem; /* Tighter for better impact at larger sizes */
            text-align: center;
            max-width: 85%;
            line-height: 1.2;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .logo {
                width: 80%; 
            }
            .tagline {
                font-size: 1.2rem; /* Scaled down but still readable on mobile */
                font-weight: 600;
            }
        }
    </style>
</head>
<body>

    <img src="kesai.png" alt="KE:SAI Logo" class="logo">

    <div class="tagline">
        Kyutai ELLIS Scalable Autonomous Intelligence
    </div>

</body>
</html>
