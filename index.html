<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ke-Sai</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background-color: #000000; /* Pure Black */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; /* Prevents accidental scrolling */
        }

        .logo {
            display: block;
            height: auto;
            /* Responsive Widths */
            width: 50%; 
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .logo {
                width: 80%; 
            }
        }
    </style>
</head>
<body>

    <img src="kesai.png" alt="Ke-Sai Logo" class="logo">

</body>
</html>
